<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Spor Yayını</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        #container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        #header {
            background: linear-gradient(90deg, #1e40af 0%, #1e3a8a 100%);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        #header h1 {
            font-size: 24px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #live-indicator {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            color: white;
            font-size: 14px;
        }

        .live-dot {
            width: 12px;
            height: 12px;
            background-color: #ef4444;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        #video-container {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #loading {
            position: absolute;
            color: white;
            font-size: 18px;
            text-align: center;
            display: none;
            z-index: 10;
        }

        #error {
            position: absolute;
            color: #ef4444;
            font-size: 16px;
            text-align: center;
            background: rgba(0,0,0,0.8);
            padding: 16px 24px;
            border-radius: 8px;
            display: none;
            z-index: 10;
            max-width: 80%;
        }

        #error.show {
            display: block;
        }

        #loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">
            <h1>
                <span>⚽</span>
                Canlı Spor Yayını
            </h1>
            <div id="live-indicator">
                <span class="live-dot"></span>
                CANLI
            </div>
        </div>
        <div id="video-container">
            <div id="loading" class="show">Yükleniyor...</div>
            <div id="error"></div>
            <video id="video" controls></video>
        </div>
    </div>

    <script>
        const VIDEO_URL = 'https://white-sky-0cce.esraerolsk2.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-1.m3u8';
        const video = document.getElementById('video');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');

        function showLoading() {
            loadingEl.classList.add('show');
            errorEl.classList.remove('show');
        }

        function hideLoading() {
            loadingEl.classList.remove('show');
        }

        function showError(message) {
            hideLoading();
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        console.log('Initializing HLS player...');
        showLoading();

        if (Hls.isSupported()) {
            console.log('HLS.js is supported');
            const hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                backBufferLength: 90,
                debug: false
            });

            hls.loadSource(VIDEO_URL);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                console.log('Manifest parsed, starting playback...');
                hideLoading();
                video.play().catch(err => {
                    console.log('Auto-play prevented:', err);
                });
            });

            hls.on(Hls.Events.ERROR, (event, data) => {
                console.error('HLS Error:', data);
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            console.log('Network error, trying to recover...');
                            showError('Ağ hatası, yeniden deneniyor...');
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            console.log('Media error, trying to recover...');
                            showError('Medya hatası, düzeltiliyor...');
                            hls.recoverMediaError();
                            break;
                        default:
                            console.log('Fatal error');
                            showError('Yayın başlatılamadı');
                            break;
                    }
                }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            console.log('Using native HLS support (Safari)');
            video.src = VIDEO_URL;

            video.addEventListener('loadedmetadata', () => {
                console.log('Metadata loaded');
                hideLoading();
                video.play().catch(err => {
                    console.log('Auto-play prevented:', err);
                });
            });

            video.addEventListener('error', (e) => {
                console.error('Video error:', e);
                showError('Video yüklenemedi');
            });
        } else {
            console.error('HLS not supported');
            showError('Tarayıcınız HLS desteklemiyor');
        }
    </script>
</body>
</html>
