<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
@page {
  size: 58mm 40mm;
  margin: 0;
  padding: 0;
}

body {
  margin: 0;
  padding: 0.5mm 0.3mm 0.5mm 1mm;
  font-family: Arial, sans-serif;
  font-size: 10px;
  line-height: 1.1;
  width: 57mm;
  max-width: 57mm;
  height: 39mm;
  max-height: 39mm;
  overflow: hidden;
  page-break-after: avoid;
  display: flex;
  align-items: center;
  justify-content: center;
}

.label {
  width: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 0.2mm;
  overflow: hidden;
  padding: 0;
  text-align: center;
}

.row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5px;
  padding: 0;
  margin: 0;
  min-height: 3mm;
  overflow: hidden;
  justify-content: center;
  align-items: center;
}

.label strong {
  font-weight: bold;
  margin-right: 2px;
}

@media print {
  * {
    margin: 0 !important;
    padding: 0 !important;
    page-break-inside: avoid;
    page-break-before: avoid;
    page-break-after: avoid;
  }
  
  html, body {
    margin: 0;
    padding: 0.5mm;
    height: 100%;
    width: 100%;
  }
  
  html {
    overflow: hidden;
  }
}
</style>
</head>
<body>
<div class="label">
  <div class="row"><strong>Ad:</strong> <span id="val-ad_soyad">-</span></div>
  <div class="row"><strong>Tel:</strong> <span id="val-telefon">-</span></div>
  <div class="row"><strong>Model:</strong> <span id="val-model">-</span></div>
  <div class="row"><span id="val-ariza">-</span></div>
  <div class="row"><strong>Tarih:</strong> <span id="val-tarih">-</span></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const setText = (id, key) => {
  const el = document.getElementById(id);
  if (!el) return;
  let value = params.get(key);
  if (value) {
    value = decodeURIComponent(value).trim();
  }
  el.textContent = value && value.length > 0 ? value : '-';
};

setText('val-ad_soyad', 'ad_soyad');
setText('val-telefon', 'telefon');
setText('val-model', 'model');
setText('val-ariza', 'ariza');
setText('val-tarih', 'tarih');
</script>
</body>
</html>
